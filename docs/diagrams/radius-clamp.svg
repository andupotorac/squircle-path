<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 240" role="img" aria-labelledby="title desc">
  <title id="title">Radius clamping</title>
  <desc id="desc">Requested radii that are too large are scaled down so adjacent corners fit on the same edge.</desc>
  <rect width="520" height="240" fill="#f8fafc"/>
  <g transform="translate(50 50)">
    <text x="0" y="-18" fill="#0f172a" font-family="system-ui, sans-serif" font-size="15">Requested</text>
    <rect x="0" y="0" width="160" height="100" fill="#e2e8f0" stroke="#94a3b8"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#ef4444" stroke-width="4"/>
    <circle cx="160" cy="0" r="70" fill="none" stroke="#ef4444" stroke-width="4"/>
    <path d="M 0 118 L 160 118" stroke="#334155" stroke-width="2"/>
    <text x="42" y="142" fill="#475569" font-family="system-ui, sans-serif" font-size="13">too much radius</text>
  </g>
  <g transform="translate(310 50)">
    <text x="0" y="-18" fill="#0f172a" font-family="system-ui, sans-serif" font-size="15">Clamped</text>
    <rect x="0" y="0" width="160" height="100" fill="#e2e8f0" stroke="#94a3b8"/>
    <path d="M 50 0 L 110 0 C 125 0 134 0 141 2 C 150 4 156 10 158 19 C 160 26 160 35 160 50 L 160 100 L 0 100 L 0 50 C 0 35 0 26 2 19 C 4 10 10 4 19 2 C 26 0 35 0 50 0 Z" fill="#2563eb"/>
    <path d="M 0 118 L 160 118" stroke="#334155" stroke-width="2"/>
    <text x="28" y="142" fill="#475569" font-family="system-ui, sans-serif" font-size="13">fits available edge</text>
  </g>
  <path d="M 235 100 L 280 100" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>
